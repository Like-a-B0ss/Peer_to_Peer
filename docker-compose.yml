services:
  peer:
    build: .
    container_name: ${CONTAINER_NAME:-p2p-bootstrap}
    environment:
      PEER_NAME: ${PEER_NAME:-bootstrap}
      HTTP_PORT: ${HTTP_PORT:-8000}
      P2P_PORT: ${P2P_PORT:-7000}
      P2P_ADVERTISE_HOST: ${P2P_ADVERTISE_HOST}
      P2P_ADVERTISE_PORT: ${P2P_ADVERTISE_PORT:-7000}
      BOOTSTRAP_PEERS: ${BOOTSTRAP_PEERS:-}
      MAX_CONNECTIONS: ${MAX_CONNECTIONS:-20}
      MESSAGE_RATE_LIMIT: ${MESSAGE_RATE_LIMIT:-8}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-10}
    ports:
      - "${HTTP_PORT:-8000}:${HTTP_PORT:-8000}"
      - "${P2P_PORT:-7000}:${P2P_PORT:-7000}"
    volumes:
      - bootstrap_data:/data

volumes:
  bootstrap_data:
