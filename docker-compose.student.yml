services:
  peer:
    build: .
    container_name: ${CONTAINER_NAME:-p2p-student}
    environment:
      PEER_NAME: ${PEER_NAME:-student}
      HTTP_PORT: ${HTTP_PORT:-8000}
      P2P_PORT: ${P2P_PORT:-7000}
      P2P_ADVERTISE_HOST: ${P2P_ADVERTISE_HOST}
      BOOTSTRAP_PEERS: ${BOOTSTRAP_PEERS:-}
      MAX_CONNECTIONS: ${MAX_CONNECTIONS:-20}
      MESSAGE_RATE_LIMIT: ${MESSAGE_RATE_LIMIT:-8}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-10}
    ports:
      - "${HTTP_PORT:-8000}:8000"
      - "${P2P_PORT:-7000}:7000"
    volumes:
      - student_data:/data

volumes:
  student_data:
